<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="PadelButton">
  <defs>
    <radialGradient id="shade" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c2cad3" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0b0f14"/>
  <!-- split accent ring: teal right half, amber left half -->
  <path d="M 256 106 A 150 150 0 0 1 256 406" fill="none" stroke="#2dd4bf" stroke-width="26" stroke-linecap="round"/>
  <path d="M 256 106 A 150 150 0 0 0 256 406" fill="none" stroke="#f59e0b" stroke-width="26" stroke-linecap="round"/>
  <!-- ball -->
  <circle cx="256" cy="256" r="116" fill="#eef1f5"/>
  <circle cx="256" cy="256" r="116" fill="url(#shade)"/>
  <!-- seam -->
  <line x1="178" y1="178" x2="334" y2="334" stroke="#2dd4bf" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
</svg>
